  <text x="824" y="356" fill="#E2E8F0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">No drift guessing. No digging through logs.</text>
  <text x="824" y="388" fill="#E2E8F0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">Just a clear fix recipe in the PR.</text>
