  <text x="72" y="144" fill="#94A3B8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22">PR feedback for Drizzle migration collisions</text>

  <rect x="72" y="188" width="328" height="340" rx="20" fill="#111827" stroke="#334155"/>
  <text x="96" y="226" fill="#F8FAFC" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" font-weight="600">1. PR check turns red</text>
  <rect x="96" y="252" width="280" height="64" rx="14" fill="#3F1D1D"/>
  <circle cx="128" cy="284" r="10" fill="#F87171"/>
  <text x="150" y="292" fill="#FDE68A" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">collision/history</text>
  <text x="96" y="354" fill="#E2E8F0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">[0005_snapshot.json, 0006_snapshot.json]</text>
  <text x="96" y="386" fill="#E2E8F0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">point to the same parent snapshot.</text>

  <rect x="436" y="188" width="328" height="340" rx="20" fill="#111827" stroke="#334155"/>
  <text x="460" y="226" fill="#F8FAFC" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" font-weight="600">2. Sticky PR comment explains it</text>
