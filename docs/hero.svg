  <text x="484" y="292" fill="#38BDF8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">How to fix</text>
  <text x="484" y="334" fill="#E2E8F0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">- pull latest main</text>
  <text x="484" y="364" fill="#E2E8F0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">- regenerate migration</text>
  <text x="484" y="394" fill="#E2E8F0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">- push and re-run CI</text>

  <rect x="800" y="188" width="328" height="340" rx="20" fill="#111827" stroke="#334155"/>
  <text x="824" y="226" fill="#F8FAFC" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" font-weight="600">3. Re-check goes green</text>
