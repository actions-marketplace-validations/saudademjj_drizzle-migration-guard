name: drizzle-migration-guard-ci

on:
  push:
    paths:
      - ".github/workflows/drizzle-migration-guard-ci.yml"
      - "**"
  pull_request:
    paths:
      - ".github/workflows/drizzle-migration-guard-ci.yml"
      - "**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run ci
