name: drizzle-migration-guard-ci

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  strict:
    name: Strict Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run ci:strict

  compatibility:
    name: Compatibility (${{ matrix.os }} / Node ${{ matrix.node-version }})
    needs: strict
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node-version: 20
          - os: ubuntu-latest
            node-version: 22
          - os: windows-latest
            node-version: 20
          - os: macos-latest
            node-version: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run ci

  action-smoke-success:
    name: Action Smoke (success)
    needs: strict
    runs-on: ubuntu-latest
    env:
      SMOKE_DIR: .smoke/success
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare smoke fixture
        shell: bash
        run: |
          mkdir -p "$SMOKE_DIR"
          cp -R tests/fixtures/valid/. "$SMOKE_DIR"
          cat > "$SMOKE_DIR/package.json" <<'JSON'
          {
            "name": "drizzle-migration-guard-smoke-success",
            "private": true,
            "type": "module",
            "devDependencies": {
              "drizzle-kit": "0.31.8",
              "drizzle-orm": "0.44.7"
            }
          }
          JSON
          cat > "$SMOKE_DIR/drizzle.config.ts" <<'TS'
          export default {
            schema: "./src/db/schema.ts",
            out: "./drizzle",
            dialect: "postgresql",
          };
          TS
          cd "$SMOKE_DIR"
          npm install --no-package-lock

      - id: guard
        uses: ./
        with:
          working-directory: ${{ env.SMOKE_DIR }}
          config: drizzle.config.ts
          comment-mode: off

      - name: Assert success outputs
        shell: bash
        run: |
          test "${{ steps.guard.outputs.status }}" = "success"
          echo "${{ steps.guard.outputs.summary }}" | grep -qi "check"

  action-smoke-collision:
    name: Action Smoke (collision)
    needs: strict
    runs-on: ubuntu-latest
    env:
      SMOKE_DIR: .smoke/collision
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare collision fixture
        shell: bash
        run: |
          mkdir -p "$SMOKE_DIR"
          cp -R tests/fixtures/valid/. "$SMOKE_DIR"
          cat > "$SMOKE_DIR/package.json" <<'JSON'
          {
            "name": "drizzle-migration-guard-smoke-collision",
            "private": true,
            "type": "module",
            "devDependencies": {
              "drizzle-kit": "0.31.8",
              "drizzle-orm": "0.44.7"
            }
          }
          JSON
          cat > "$SMOKE_DIR/drizzle.config.ts" <<'TS'
          export default {
            schema: "./src/db/schema.ts",
            out: "./drizzle",
            dialect: "postgresql",
          };
          TS
          node -e "const fs=require('fs');const p='$SMOKE_DIR/drizzle/meta/0001_snapshot.json';const json=JSON.parse(fs.readFileSync(p,'utf8'));json.prevId='00000000-0000-0000-0000-000000000000';fs.writeFileSync(p,JSON.stringify(json,null,2));"
          cd "$SMOKE_DIR"
          npm install --no-package-lock

      - id: guard
        continue-on-error: true
        uses: ./
        with:
          working-directory: ${{ env.SMOKE_DIR }}
          config: drizzle.config.ts
          comment-mode: off
          fail-on: collision

      - name: Assert blocking failure
        shell: bash
        run: |
          test "${{ steps.guard.outcome }}" = "failure"
          test "${{ steps.guard.outputs.status }}" = "failure"
          echo "${{ steps.guard.outputs.summary }}" | grep -qi "blocking failure"
